trigger:
- main  # Or 'master' if that's your default branch

variables:
- group: variablecall  # Contains ACR_USERNAME and ACR_PASSWORD
- name: tag
  value: 'latest'
- name: app-name
  value: 'cloud-app'
- name: acrrepo
  value: 'narni.azurecr.io'
- name: acrServiceConnection
  value: 'veeranarni'  # Name of ACR service connection in DevOps
- name: sshConnection
  value: 'avmconnect'             # Name of SSH service connection

pool:
  name: 'vardhan'  # Self-hosted agent pool
  #vmImage: 'ubuntu-latest'

steps:
# Step 1: Docker Build and Push
- task: Docker@2
  displayName: 'Build and Push Docker Image to ACR'
  inputs:
    containerRegistry: '$(acrServiceConnection)'
    repository: $(app-name)
    command: 'buildAndPush'
    Dockerfile: '**/Dockerfile'
    tags: |
      $(tag)

# Step 2: SSH into VM and Run Docker Image
- task: SSH@0
  displayName: 'Run Docker Image on Azure VM'
  inputs:
    sshEndpoint: '$(sshConnection)'
    runOptions: 'commands'
    commands: |
      set +e  # Allow non-zero exit codes so warnings don't fail the task

      echo "$(ACR_PASSWORD)" | docker login $(acrrepo) -u "$(ACR_USERNAME)" --password-stdin 2>/dev/null
      echo "Logged into ACR"

      echo "Pulling image..."
      docker pull $(acrrepo)/$(app-name):latest

      echo "Stopping old container..."
      docker stop $(app-name) 2>/dev/null || true
      docker rm $(app-name) 2>/dev/null || true

      echo "Running container..."
      docker run -d -p 80:80 --name $(app-name) $(acrrepo)/$(app-name):latest

      echo "Deployment complete."








